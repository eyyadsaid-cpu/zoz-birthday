<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Zoz ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: 'Poppins', sans-serif;
}

.start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  color: red;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 24px;
  z-index: 999;
  cursor: pointer;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  50% { opacity: 0.3; }
}

.text {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: red;
  font-size: 30px;
  font-weight: 600;
  text-shadow: 0 0 12px red;
  display: none;
}

.small-heart {
  position: absolute;
  color: red;
  opacity: 0.7;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 0.8; }
}
</style>
</head>

<body>

<div class="start" id="startScreen">
  I have something for you… 
</div>

<canvas id="canvas"></canvas>

<div class="text" id="msg">ZOZ HBD</div>

<audio id="music" loop>
  <source src="love.mp3.mpeg" type="audio/mpeg">
</audio>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = innerWidth;
canvas.height = innerHeight;

// MATRIX
const letters = "01<>/{}[]#$%^&*";
const fontSize = 16;
const columns = canvas.width / fontSize;
const drops = Array(Math.floor(columns)).fill(1);

// HEART
let particles = [];
let progress = 0;
let complete = false;
let beat = 0;

function heart(t){
  return {
    x:16*Math.pow(Math.sin(t),3),
    y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))
  };
}

function createParticles(){
  particles=[];
  for(let i=0;i<1500;i++){
    let t=Math.random()*Math.PI*2;
    let pos=heart(t);

    particles.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height,
      tx:canvas.width/2+pos.x*10,
      ty:canvas.height/2+pos.y*10+80
    });
  }
}

// SPACE
let warp=false;
let warpSpeed=0.05; // بطيء
let planetScale=0;

let stars=[];
for(let i=0;i<400;i++){
  stars.push({
    x:Math.random()*canvas.width-canvas.width/2,
    y:Math.random()*canvas.height-canvas.height/2,
    z:Math.random()*canvas.width
  });
}

function draw(){

  if(warp){
    ctx.fillStyle="rgba(0,0,0,0.2)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    warpSpeed += 0.002; // تسارع تدريجي بطيء

    stars.forEach(s=>{
      let px=(s.x/s.z)*200+canvas.width/2;
      let py=(s.y/s.z)*200+canvas.height/2;

      ctx.fillStyle="red";
      ctx.fillRect(px,py,2,2);

      s.z -= warpSpeed;

      if(s.z<=1){
        s.z=canvas.width;
      }
    });

    // planet slow zoom
    planetScale += 0.005;

    ctx.beginPath();
    ctx.arc(canvas.width/2, canvas.height/2, 60*planetScale, 0, Math.PI*2);
    ctx.fillStyle="red";
    ctx.shadowColor="red";
    ctx.shadowBlur=20;
    ctx.fill();
  }

  else{

    ctx.fillStyle="rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    // MATRIX
    ctx.fillStyle="red";
    ctx.font=fontSize+"px monospace";

    for(let i=0;i<drops.length;i++){
      const text=letters[Math.floor(Math.random()*letters.length)];
      ctx.fillText(text,i*fontSize,drops[i]*fontSize);

      if(drops[i]*fontSize>canvas.height && Math.random()>0.97)
        drops[i]=0;

      drops[i]++;
    }

    // PARTICLES slow forming
    if(!complete){
      progress += 0.02;

      particles.forEach(p=>{
        p.x += (p.tx - p.x)*0.01 * progress;
        p.y += (p.ty - p.y)*0.01 * progress;

        ctx.fillStyle="red";
        ctx.fillRect(p.x,p.y,2,2);
      });

      if(progress > 4) complete = true;
    }

    // FINAL HEART
    if(complete){
      beat+=0.05;
      let scale=1+Math.sin(beat)*0.05;

      ctx.save();
      ctx.translate(canvas.width/2, canvas.height/2+80);
      ctx.scale(scale, scale);
      ctx.translate(-canvas.width/2, -canvas.height/2-80);

      ctx.beginPath();
      for(let t=0;t<Math.PI*2;t+=0.01){
        let pos=heart(t);
        let x=canvas.width/2 + pos.x*10;
        let y=canvas.height/2 + pos.y*10 + 80;
        if(t===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fillStyle="red";
      ctx.shadowColor="red";
      ctx.shadowBlur=50;
      ctx.fill();

      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}
draw();

// START
document.getElementById("startScreen").onclick=()=>{
  document.getElementById("startScreen").style.display="none";
  document.getElementById("music").play();

  warp=true;

  setTimeout(()=>{
    warp=false;
    startHearts();
    createParticles();
    document.getElementById("msg").style.display="block";
  },15000); // 15 ثانية
};

// HEARTS
function startHearts(){
  setInterval(()=>{
    const h=document.createElement("div");
    h.className="small-heart";
    h.innerHTML="❤️";

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*12+10)+"px";
    h.style.animationDuration=(Math.random()*4+4)+"s";

    document.body.appendChild(h);
    setTimeout(()=>h.remove(),7000);
  },300);
}
</script>

</body>
</html>
